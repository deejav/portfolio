<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · Dorine Njatha</title>
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --dark: #0f0f0f;
    --card: #161616;
    --c1: #C9F138;
    --c2: #38F1BD;
    --c3: #6038F1;
    --c4: #F1386C;
    --white: #F4F4EF;
    --muted: #666;
    --border: rgba(255,255,255,0.07);
    --font-display: 'Manrope', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Big glows */
  .glow-1 {
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(96,56,241,0.2) 0%, transparent 70%);
    pointer-events: none;
    animation: drift1 8s ease-in-out infinite;
  }
  .glow-2 {
    position: fixed;
    bottom: -200px; right: -200px;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(241,56,108,0.15) 0%, transparent 70%);
    pointer-events: none;
    animation: drift2 10s ease-in-out infinite;
  }
  .glow-3 {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(56,241,189,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, 30px); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, -40px); }
  }

  /* Main content */
  .container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* The big 404 */
  .four-o-four {
    position: relative;
    display: inline-block;
    margin-bottom: 0;
    line-height: 1;
  }

  .four-o-four-text {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(8rem, 22vw, 14rem);
    letter-spacing: -0.05em;
    line-height: 1;
    /* Split coloring via gradient */
    background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 40%, var(--c3) 70%, var(--c4) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    /* Subtle pulse */
    animation: pulse 4s ease-in-out infinite;
    display: block;
  }

  @keyframes pulse {
    0%, 100% { filter: brightness(1); }
    50%       { filter: brightness(1.12); }
  }

  /* Divider line */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0.5rem 0 2rem;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c4);
    box-shadow: 0 0 8px var(--c4);
  }

  .headline {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    letter-spacing: -0.025em;
    margin-bottom: 1rem;
    line-height: 1.15;
  }

  .headline .outline {
    -webkit-text-stroke: 1.5px rgba(255,255,255,0.35);
    -webkit-text-fill-color: transparent;
  }

  .sub {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.75;
    font-weight: 300;
    margin-bottom: 2.5rem;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Buttons */
  .actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--c1);
    color: var(--black);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.88rem;
    padding: 0.8rem 1.8rem;
    border-radius: 100px;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: all 0.25s;
  }
  .btn-home:hover {
    background: var(--c4);
    color: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(241,56,108,0.3);
  }

  .btn-contact {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 0.88rem;
    padding: 0.8rem 1.8rem;
    border-radius: 100px;
    text-decoration: none;
    background: rgba(255,255,255,0.02);
    transition: all 0.25s;
  }
  .btn-contact:hover {
    border-color: rgba(56,241,189,0.3);
    color: var(--c2);
    background: rgba(56,241,189,0.05);
  }

  /* Nav logo */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 1.25rem 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(8,8,8,0.6);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1rem;
    color: var(--white);
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .nav-logo span { color: var(--c1); }

  .nav-back {
    font-size: 0.8rem;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--white); }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>
<div class="glow-3"></div>

<nav>
  <a href="index.html" class="nav-logo">Dee<span>.</span></a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to portfolio
  </a>
</nav>

<div class="container">
  <div class="four-o-four">
    <span class="four-o-four-text">404</span>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <h1 class="headline">
    This page didn't<br>
    <span class="outline">convert.</span>
  </h1>

  <p class="sub">
    Looks like this URL fell out of the funnel. The page you're looking for doesn't exist — but the rest of the portfolio does.
  </p>

  <div class="actions">
    <a href="index.html" class="btn-home">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Take me home
    </a>
    <a href="mailto:njathadorine@gmail.com" class="btn-contact">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Contact Dee
    </a>
  </div>
</div>

</body>
</html>
